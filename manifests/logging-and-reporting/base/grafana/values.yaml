---
securityContext:
  runAsUser: null
  fsGroup: null
  runAsGroup: null

podSecurityContext:
  enabled: false

testFramework:
  enabled: false

ingress:
  enabled: true
  path: /
  hosts:
  - grafana-127-0-0-1.nip.io

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Loki
      uid: loki
      type: loki
      url: http://loki-gateway/
      access: proxy
      version: 1
      isDefault: true
      jsonData:
        maxLines: 5000
        derivedFields:
        - name: trace_id
          matcherRegex: trace_id=(\w+)
          datasourceUid: tempo
          url: $${__value.raw}
    - name: Prometheus
      uid: prometheus
      type: prometheus
      url: http://kube-prometheus-stack-prometheus:9090/
      access: proxy
      isDefault: false
    - name: Tempo
      uid: tempo
      type: tempo
      url: http://tempo:3200
      access: proxy
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus

env:
  GF_AUTH_ANONYMOUS_ENABLED: true
  GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
  GF_USERS_DEFAULT_THEME: light
